  }

    font-size: 12px;

  .diff-easy { background: #c8e6c9; color: #2e7d32; }
  .diff-medium { background: #fff3e0; color: #e65100; }
  .diff-hard { background: #ffcdd2; color: #c62828; }
  .question-text {
    font-size: 22px;

    color: #263238;
    margin-bottom: 28px;

    border-radius: 12px;

  .option {

    background: #fafafa;
    display: flex;
    align-items: center;

    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #e0e0e0;
    margin-right: 14px;
    font-weight: bold;
    color: #555;
    flex-shrink: 0;
  }
  .option.selected .label { background: #1565c0; color: #fff; }
  .actions {
    display: flex;
    justify-content: space-between;
    margin-top: 28px;
    gap: 12px;
  }
  .btn {
    padding: 12px 28px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;

  .result-card .comment.good { background: #e3f2fd; color: #0d47a1; }

    overflow-y: auto;

  .result-detail .item.wrong-item { background: #ffcdd2; }
  .result-detail .q { font-weight: bold; }
  .result-detail .ans { margin-top: 2px; color: #546e7a; }
  .hidden { display: none; }
  .footer-info { text-align: center; margin-top: 20px; color: #b0bec5; font-size: 13px; }
  @media (max-width: 520px) {

</head>

  </div>

  { q: "图书馆有科技书 3020 本，故事书 2980 本，两种书大约共有多少本？",
    opts: ["5000本", "6000本", "7000本", "4000本"], ans: 1, diff: "hard" },
  { q: "800 和 8000 相比，8000 比 800 多多少？", opts: ["7200", "720", "72", "72000"], ans: 0, diff: "hard" },
  { q: "按规律填数：1800、2000、2200、____、2600", opts: ["2300", "2400", "2500", "2100"], ans: 1, diff: "hard" },
  { q: "按规律填数：5060、5070、5080、____、5100", opts: ["5085", "5090", "5095", "5080"], ans: 1, diff: "hard" }
];

// ===== 应用逻辑 =====
var LABELS = ["A", "B", "C", "D"];
var DIFF_MAP = { easy: "基础", medium: "中等", hard: "较难" };
var DIFF_CLASS = { easy: "diff-easy", medium: "diff-medium", hard: "diff-hard" };

var currentQuestions = [];
var currentIndex = 0;
var answers = [];
var selectedOption = null;

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function pickQuestions() {
  var byDiff = { easy: [], medium: [], hard: [] };
  for (var i = 0; i < ALL_QUESTIONS.length; i++) {
    byDiff[ALL_QUESTIONS[i].diff].push(ALL_QUESTIONS[i]);
  }
  var picked = []
    .concat(shuffle(byDiff.easy).slice(0, 4))
    .concat(shuffle(byDiff.medium).slice(0, 4))
    .concat(shuffle(byDiff.hard).slice(0, 2));
  return shuffle(picked);
}

function renderQuestion() {
  var q = currentQuestions[currentIndex];
  document.getElementById("qNum").textContent = "第 " + (currentIndex + 1) + "/10 题";
  diffTag = document.getElementById("diffTag");
  diffTag.textContent = DIFF_MAP[q.diff];
  diffTag.className = "difficulty-tag " + DIFF_CLASS[q.diff];
  document.getElementById("progressFill").style.width = (currentIndex / 10 * 100) + "%";
  document.getElementById("questionText").textContent = q.q;

  var container = document.getElementById("optionsContainer");
  container.innerHTML = "";
  for (var i = 0; i < q.opts.length; i++) {
    (function(idx) {
      var div = document.createElement("div");
      div.className = "option";
      div.innerHTML = '<span class="label">' + LABELS[idx] + '</span>' + q.opts[idx];
      div.addEventListener("click", function() { selectOption(idx); });
      container.appendChild(div);
    })(i);
  }

  selectedOption = null;
  document.getElementById("btnNext").disabled = true;
}

function selectOption(index) {
  if (selectedOption !== null) return;
  var opts = document.querySelectorAll(".option");
  for (var i = 0; i < opts.length; i++) {
    if (i === index) opts[i].classList.add("selected");
  }
  selectedOption = index;
  answers[currentIndex] = index;
  document.getElementById("btnNext").disabled = false;
}

function showNext() {
  if (currentIndex < 9) {
    currentIndex++;
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("quizArea").classList.add("hidden");
  document.getElementById("resultArea").classList.remove("hidden");

  var correct = 0;
  var details = [];
  for (var i = 0; i < currentQuestions.length; i++) {
    var q = currentQuestions[i];
    var userAns = answers[i];
    var isCorrect = (userAns === q.ans);
    if (isCorrect) correct++;
    details.push({
      question: q.q,
      correctIdx: q.ans,
      userIdx: userAns,
      isCorrect: isCorrect,
      opts: q.opts
    });
  }

  document.getElementById("finalScore").textContent = correct;
  var pct = correct / 10;
  var commentBox = document.getElementById("commentBox");
  commentBox.className = "comment";
  if (pct >= 0.9) {
    commentBox.textContent = "太棒了！你是数学小达人！";
    commentBox.classList.add("excellent");
  } else if (pct >= 0.7) {
    commentBox.textContent = "做得不错！继续加油！";
    commentBox.classList.add("good");
  } else if (pct >= 0.5) {
    commentBox.textContent = "还可以，多练习会更好！";
    commentBox.classList.add("ok");
  } else {
    commentBox.textContent = "别灰心，再来一次吧！";
    commentBox.classList.add("poor");
  }

  var detailDiv = document.getElementById("resultDetail");
  detailDiv.innerHTML = "<h3 style='margin-bottom:12px'>答题详情</h3>";
  for (var i = 0; i < details.length; i++) {
    var d = details[i];
    var item = document.createElement("div");
    item.className = "item " + (d.isCorrect ? "correct-item" : "wrong-item");
    var corrLabel = LABELS[d.correctIdx];
    var corrText = d.opts[d.correctIdx];
    var html = '<div class="q">' + (i + 1) + ". " + d.question + "</div>";
    if (!d.isCorrect) {
      var userLabel = d.userIdx !== undefined ? LABELS[d.userIdx] : "未选";
      html += '<div class="ans">你选了：' + userLabel + "（错误）</div>";
    }
    html += '<div class="ans">正确答案：' + corrLabel + ". " + corrText + "</div>";
    item.innerHTML = html;
    detailDiv.appendChild(item);
  }
}

function resetQuiz() {
  currentQuestions = pickQuestions();
  currentIndex = 0;
  answers = [];
  for (var i = 0; i < 10; i++) answers.push(undefined);
  selectedOption = null;
  document.getElementById("resultArea").classList.add("hidden");
  document.getElementById("quizArea").classList.remove("hidden");
  renderQuestion();
}

document.getElementById("btnNext").addEventListener("click", showNext);
document.getElementById("btnReset").addEventListener("click", resetQuiz);
document.getElementById("btnRetry").addEventListener("click", resetQuiz);

resetQuiz();
</script>
</body>
</html>
